name: Deploy Timehuddle Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Timehuddle Backend - ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: DEV
            host_secret: TIMECORE_DEV_HOST
            port: 2063
            branch: main
            health_url_secret: TIMECORE_DEV_HEALTH_URL
          - env: PROD
            host_secret: TIMECORE_PROD_HOST
            port: 2065
            branch: main
            health_url_secret: TIMECORE_PROD_HEALTH_URL

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ matrix.port }} ${{ secrets[matrix.host_secret] }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to ${{ matrix.env }}
        run: |
          ssh -p ${{ matrix.port }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets[matrix.host_secret] }} << 'EOF'
            set -e

            REPO_DIR="$HOME/timeharbor-timehuddle-backend"

            # Fix git safe directory (sudo npm creates root-owned files)
            git config --global --add safe.directory "$REPO_DIR" 2>/dev/null || true

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "📥 Cloning repository for first-time setup..."
              git clone -b ${{ matrix.branch }} https://github.com/Dharp02/timeharbor-timehuddle-backend.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            echo "🔄 Pulling latest code on ${{ matrix.branch }}..."
            git fetch origin
            git pull origin ${{ matrix.branch }}

            echo "⚙️  Installing dependencies..."
            sudo npm install --no-audit --no-fund

            echo "🔄 Restarting PM2 backend..."
            cd "$REPO_DIR"
            if sudo pm2 describe timehuddle-api > /dev/null 2>&1; then
              sudo pm2 restart timehuddle-api --update-env
            else
              sudo pm2 start src/server.ts \
                --name "timehuddle-api" \
                --interpreter "$REPO_DIR/node_modules/.bin/tsx" \
                --cwd "$REPO_DIR" \
                --update-env
            fi
            sudo pm2 save

            echo "✅ ${{ matrix.env }} backend deployment completed!"
            sudo pm2 status
          EOF

      - name: Deployment Status
        if: failure()
        run: echo "❌ ${{ matrix.env }} backend deployment failed!"

      - name: Verify ${{ matrix.env }} health
        run: |
          HEALTH_URL="${{ secrets[matrix.health_url_secret] }}"
          HEALTH_HOST=$(echo "$HEALTH_URL" | sed 's|https\?://||' | cut -d'/' -f1)

          echo "Pinging $HEALTH_HOST..."
          ping -c 3 "$HEALTH_HOST" || echo "Ping failed (may be ICMP-blocked), continuing..."

          echo "Waiting for tsx server to compile and start..."
          for i in $(seq 1 10); do
            sleep 10
            HTTP_CODE=$(curl -s -o /tmp/health_body.txt -w "%{http_code}" "$HEALTH_URL")
            BODY=$(cat /tmp/health_body.txt)
            echo "Attempt $i — HTTP $HTTP_CODE — Body: $BODY"
            if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✅ ${{ matrix.env }} backend is healthy"
              exit 0
            fi
            if [ "$HTTP_CODE" != "502" ] && [ "$HTTP_CODE" != "000" ]; then
              echo "Unexpected HTTP $HTTP_CODE — server may be misconfigured"
            fi
            echo "Not healthy yet, retrying in 10s..."
          done
          echo "❌ ${{ matrix.env }} backend health check failed after 10 attempts (100s)"
          exit 1
