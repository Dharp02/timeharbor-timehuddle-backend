name: Deploy Backend

on:
  push:
    branches:
      - main
      - timeharbor

jobs:
  deploy:
    name: Deploy Backend - ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: DEV
            host_secret: DEV_BACKEND_HOST
            port: 2047
            branch: timeharbor
          - env: PROD
            host_secret: PROD_BACKEND_HOST
            port: 2030
            branch: main

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ matrix.port }} ${{ secrets[matrix.host_secret] }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to ${{ matrix.env }}
        run: |
          ssh -p ${{ matrix.port }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets[matrix.host_secret] }} << 'EOF'
            set -e

            REPO_DIR="/home/pdharamkar/timeharbor-timehuddle-backend"

            # Fix git safe directory (sudo npm creates root-owned files)
            git config --global --add safe.directory "$REPO_DIR" 2>/dev/null || true

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "📥 Cloning repository for first-time setup..."
              git clone -b ${{ matrix.branch }} https://github.com/Dharp02/timeharbor-timehuddle-backend.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            echo "📦 Stashing local changes..."
            STASHED=false
            if ! git diff --quiet || ! git diff --cached --quiet; then
              git stash push -m "deploy-auto-stash"
              STASHED=true
            fi

            echo "🛑 Stopping PM2 backend..."
            sudo pm2 stop timeharbor-backend 2>/dev/null || true

            echo "🔄 Switching to ${{ matrix.branch }} and pulling latest code..."
            git fetch origin
            git checkout ${{ matrix.branch }}
            git pull origin ${{ matrix.branch }}

            echo "⚙️  Installing dependencies..."
            cd apps/api
            sudo npm install

            echo "🏗️  Building backend..."
            sudo npm run build
            cd ../..

            echo "🚀 Restarting PM2 backend..."
            sudo pm2 delete timeharbor-backend 2>/dev/null || true
            sudo pm2 start apps/api/dist/server.js --name timeharbor-backend --cwd "$REPO_DIR/apps/api"
            sudo pm2 save

            if [ "$STASHED" = true ]; then
              echo "📦 Restoring stashed changes..."
              git stash pop || echo "⚠️  Stash pop had conflicts, manual resolution needed"
            fi

            echo "✅ ${{ matrix.env }} backend deployment completed!"
            sudo pm2 status
          EOF

      - name: Deployment Status
        if: failure()
        run: echo "❌ ${{ matrix.env }} backend deployment failed!"
