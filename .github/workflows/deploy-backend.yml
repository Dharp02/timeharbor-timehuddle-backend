name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend - ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: DEV
            host_secret: DEV_BACKEND_HOST
            port: 2063
            branch: main
            health_url: https://timehubbackenddev.os.mieweb.org/health
          - env: PROD
            host_secret: PROD_BACKEND_HOST
            port: 2065
            branch: main
            health_url: https://timehubbackend.os.mieweb.org/health

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ matrix.port }} ${{ secrets[matrix.host_secret] }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to ${{ matrix.env }}
        run: |
          ssh -p ${{ matrix.port }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets[matrix.host_secret] }} << 'EOF'
            set -e

            REPO_DIR="$HOME/timeharbor-timehuddle-backend"

            # Fix git safe directory (sudo npm creates root-owned files)
            git config --global --add safe.directory "$REPO_DIR" 2>/dev/null || true

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "📥 Cloning repository for first-time setup..."
              git clone -b ${{ matrix.branch }} https://github.com/Dharp02/timeharbor-timehuddle-backend.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"


            echo "🔄 Fetching latest code on ${{ matrix.branch }}..."
            git fetch origin
            git checkout ${{ matrix.branch }}
            git reset --hard origin/${{ matrix.branch }}

            echo "⚙️  Installing dependencies..."
            sudo npm install --no-audit --no-fund

            echo "⏹️  Killing PM2 daemon (clean slate)..."
            sudo pm2 kill 2>/dev/null || true

            echo "🚀 Starting PM2 backend..."
            cd "$REPO_DIR"
            sudo pm2 start src/server.ts \
              --name "timeharbor-api" \
              --interpreter "$REPO_DIR/node_modules/.bin/tsx" \
              --cwd "$REPO_DIR" \
              --update-env
            sudo pm2 save

            echo "✅ ${{ matrix.env }} backend deployment completed!"
            sudo pm2 status
          EOF

      - name: Deployment Status
        if: failure()
        run: echo "❌ ${{ matrix.env }} backend deployment failed!"

      - name: Verify ${{ matrix.env }} health
        run: |
          HEALTH_HOST=$(echo "${{ matrix.health_url }}" | sed 's|https\?://||' | cut -d'/' -f1)
          echo "Pinging $HEALTH_HOST..."
          ping -c 3 "$HEALTH_HOST" || echo "Ping failed (may be blocked), continuing..."

          echo "Waiting for server to finish startup..."
          for i in $(seq 1 10); do
            sleep 10
            BODY=$(curl -s "${{ matrix.health_url }}")
            echo "Attempt $i — Response: $BODY"
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "${{ matrix.env }} backend is healthy"
              exit 0
            fi
            echo "Not healthy yet, retrying..."
          done
          echo "${{ matrix.env }} backend health check failed after all retries"
          exit 1
